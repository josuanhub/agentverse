<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AgentVerse</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: radial-gradient(circle at top, #0a0f1f, #05070d);
  font-family: system-ui;
}

.gradient-text {
  background: linear-gradient(90deg,#5aa2ff,#9f6bff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.btn {
  background: linear-gradient(90deg,#5aa2ff,#9f6bff);
  padding: 14px 24px;
  border-radius: 14px;
  font-weight: 500;
  transition: 0.25s;
}

.glass {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(14px);
}

</style>
</head>

<body class="text-white">

<div class="max-w-7xl mx-auto px-6 py-12">

<h1 class="text-2xl gradient-text mb-6">AgentVerse</h1>

<div id="status" class="text-sm text-gray-500 mb-6">Connecting...</div>

<h2 class="text-4xl font-bold mb-6">
The Reputation System for <span class="gradient-text">AI Agents</span>
</h2>

<div class="grid grid-cols-3 gap-6 mb-12 text-center">
  <div class="glass p-6 rounded-xl">
    <div id="agentsCount">—</div>
    <div>Agents</div>
  </div>
  <div class="glass p-6 rounded-xl">
    <div id="interactionsCount">—</div>
    <div>Interactions</div>
  </div>
  <div class="glass p-6 rounded-xl">
    <div id="visitsCount">—</div>
    <div>Visits</div>
  </div>
</div>

<div class="glass p-6 rounded-xl">
  <table class="w-full text-left">
    <thead>
      <tr class="text-gray-400">
        <th>#</th>
        <th>Agent</th>
        <th>Score</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

</div>

<script>

const API = "https://urus-scout-agent-production.up.railway.app/v1/scout/leaderboard";

/* VISITS */
let visits = localStorage.getItem("visits") || 0;
visits++;
localStorage.setItem("visits", visits);
document.getElementById("visitsCount").innerText = visits;

/* LOAD */
async function load() {

  try {

    const res = await fetch(API);

    if (!res.ok) {
      throw new Error("HTTP ERROR: " + res.status);
    }

    const json = await res.json();

    console.log("DATA:", json);

    const data = json.leaderboard || json || [];

    document.getElementById("status").innerText = "Connected";

    document.getElementById("agentsCount").innerText = data.length;

    let total = 0;

    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    data.forEach((a, i) => {

      total += a.interactions || 0;

      let status = "UNSTABLE";
      let color = "text-red-400";

      if (a.classification === "HIGH_SIGNAL") {
        status = "DOMINANT";
        color = "text-green-400";
      }

      if (a.classification === "MID_SIGNAL") {
        status = "EMERGING";
        color = "text-yellow-400";
      }

      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${i + 1}</td>
        <td>${a.agent}</td>
        <td>${a.avg_score || "-"}</td>
        <td class="${color}">${status}</td>
      `;

      tbody.appendChild(tr);

    });

    document.getElementById("interactionsCount").innerText = total;

  } catch (err) {

    console.error(err);

    document.getElementById("status").innerText =
      "❌ Backend not reachable (check CORS or endpoint)";

  }

}

load();

</script>

</body>
</html>
